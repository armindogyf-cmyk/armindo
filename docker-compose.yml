version: '3.9'
services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: sqlite+pysqlite:////app/data/epa.db
      BASE_DATA_DIR: /app/data
      SCHEMA_PATH: /sql/schema.sql
    ports:
      - "8090:8090"
    volumes:
      - ./data:/app/data
